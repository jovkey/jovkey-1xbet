services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      # Domaine(s) EXACTS du frontend déployé (ex. https://jovkey.example.com), séparés
      # par des virgules si plusieurs. OBLIGATOIRE en production : sans ça, le backend
      # refuse de démarrer (protection CORS/cookies ajoutée avec l'auth par cookie httpOnly).
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      # URLs publiques réelles (webhook FedaPay, page de retour paiement) :
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_SECRET_ROUTE: ${ADMIN_SECRET_ROUTE}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_BOOTSTRAP_PASSWORD: ${SUPERADMIN_BOOTSTRAP_PASSWORD}
      ANALYSIS_API_KEY: ${ANALYSIS_API_KEY}
      FEDAPAY_ENVIRONMENT: ${FEDAPAY_ENVIRONMENT}
      FEDAPAY_SECRET_KEY: ${FEDAPAY_SECRET_KEY}
      FEDAPAY_WEBHOOK_SECRET: ${FEDAPAY_WEBHOOK_SECRET}
      FEDAPAY_CUSTOMER_COUNTRY: ${FEDAPAY_CUSTOMER_COUNTRY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    ports:
      - "4000:4000"
    # seed:prod (PAS seed) : ne crée que le superadmin, jamais de comptes/avis de démo
    # sur une vraie base de production. Idempotent, donc sûr à chaque redémarrage.
    command: sh -c "npx prisma db push --accept-data-loss && npm run seed:prod && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      args:
        # Figées dans le bundle JS AU BUILD (voir frontend/Dockerfile) — pas en
        # `environment:` runtime, qui n'aurait aucun effet sur le code déjà compilé.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PROMO_CODE: ${NEXT_PUBLIC_PROMO_CODE}
    environment:
      # Lu au runtime par next.config.js (rewrites /api/*) — contrairement aux
      # NEXT_PUBLIC_*, celle-ci n'a pas besoin d'être figée au build.
      BACKEND_API_URL: http://backend:4000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  analysis-engine:
    build: ./analysis-engine
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 8000
      ANALYSIS_API_KEY: ${ANALYSIS_API_KEY}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL}
      SPORTS_PROVIDER: ${SPORTS_PROVIDER}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      RAPIDAPI_HOST: ${RAPIDAPI_HOST}
    ports:
      - "8000:8000"
    # Utilise l'image telle quelle (CMD par défaut = server.py, cf. analysis-engine/Dockerfile) :
    # health check HTTP + planification interne à 00:00/06:00 UTC via run.py (vraies données).

volumes:
  pgdata:
